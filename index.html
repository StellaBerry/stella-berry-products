<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stella Berry Product Manuals</title>
  <link rel="stylesheet" href="./assets/site.css">
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="./"><span class="brand-mark">S</span><span>Stella Berry Products</span></a>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <div>
          <p class="eyebrow">Documentation</p>
          <h1>Product Manuals</h1>
          <p class="lead">公開中のプロダクトマニュアル、サポート情報、利用規約をまとめるページです。</p>
          <div class="badge-row">
            <span class="badge">Manuals</span>
            <span class="badge">Terms</span>
            <span class="badge">Support</span>
          </div>
        </div>
        <div class="hero-card">
          <div class="mock-window" aria-hidden="true">
            <div class="mock-bar"><span class="mock-dot"></span><span class="mock-dot"></span><span class="mock-dot"></span></div>
            <div class="mock-body">
              <div class="mock-post"><strong>Role Garden WebUI</strong><span>Local LLM roleplay support</span></div>
              <div class="mock-post"><strong>Manual</strong><span>Install, operation, LAN, terms</span></div>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Products</h2>
        <a class="product-card" href="./role-garden-webui/">
          <span class="product-title">Role Garden WebUI</span>
          <span class="product-copy">ローカルLLM/Ollamaで、キャラクターとのタイムライン、DM、リプライ、ロールプレイを楽しむためのWindows向けWebUI。</span>
        </a>
      </section>
    </main>
  </div>
</body>
</html>
